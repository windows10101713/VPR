<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VPR | Examples</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="examples">
    <div class="app-shell">
      <aside class="sidebar">
        <div>
          <a class="brand brand-link" href="index.html">
            <div class="brand-mark">V</div>
            <div>
              <p class="eyebrow">Virtual Program Runner</p>
              <h1>VPR</h1>
            </div>
          </a>
          <nav class="menu">
            <a class="menu-item" href="index.html"><span>홈</span><small>Home</small></a>
            <a class="menu-item" href="editor.html"><span>에디터</span><small>Editor</small></a>
            <a class="menu-item is-active" href="examples.html"><span>예제</span><small>Examples</small></a>
            <a class="menu-item" href="assistant.html"><span>AI 도우미</span><small>Assistant</small></a>
            <a class="menu-item" href="errors.html"><span>에러 해결</span><small>Error Fix</small></a>
            <a class="menu-item" href="community.html"><span>공유</span><small>Community</small></a>
          </nav>
        </div>
        <div class="sidebar-card">
          <p class="eyebrow">예제 탭</p>
          <h2>언어별 코드 빠른 시작</h2>
          <p>Basic 예제는 항상 Hello from 언어 + 1+1 연산을 포함합니다.</p>
        </div>
      </aside>

      <main class="main-content page-stack">
        <header class="topbar">
          <div>
            <p class="eyebrow">Examples Workspace</p>
            <h2 id="page-title">언어별 예제 선택 후 에디터로 이동</h2>
          </div>
          <div class="topbar-actions">
            <label class="language-switch" for="localeSelect">
              <span>언어</span>
              <select id="localeSelect">
                <option value="ko">한국어</option>
                <option value="en">English</option>
              </select>
            </label>
            <label class="language-switch" for="themeSelect">
              <span>테마</span>
              <select id="themeSelect">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
            <a class="primary-button" href="editor.html">에디터 열기</a>
          </div>
        </header>

        <section class="feature-grid single-column-grid">
          <article class="feature-card wide">
            <p class="eyebrow">Language Examples</p>
            <h3 id="examplesTitle">Basic Example</h3>
            <div class="home-settings-grid">
              <label>
                언어
                <select id="examplesLanguageSelect"></select>
              </label>
              <label>
                카테고리
                <select id="examplesCategorySelect"></select>
              </label>
            </div>
            <pre id="examplesCode" class="examples-code"></pre>
            <div class="button-row">
              <button class="primary-button small" id="examplesOpenInEditorButton" type="button">에디터로 가져오기</button>
            </div>
            <div class="response-box" id="examplesStatus"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
